apiVersion: batch/v1
kind: Job
metadata:
  name: ai-evaluator-quality-gate
  labels:
    app: ai-evaluator
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      containers:
      - name: evaluator
        image: python:3.12
        command:
        - sh
        - -c
        - |
          pip install aievaluator
          aievaluator eval \
            --agent ${STAGING_AGENT_URL} \
            --dataset /data/regression.json \
            --metrics faithfulness,g_eval \
            --min-score 0.80 \
            --ci \
            --format junit > /data/report.xml
          echo "--- Report ---"
          cat /data/report.xml
        env:
        - name: AIEVALUATOR_API_KEY
          valueFrom:
            secretKeyRef:
              name: aievaluator-secrets
              key: api-key
        - name: STAGING_AGENT_URL
          value: "http://agent-service.default.svc.cluster.local/chat"
        volumeMounts:
        - name: datasets
          mountPath: /data
      volumes:
      - name: datasets
        configMap:
          name: eval-datasets
      restartPolicy: Never
  backoffLimit: 1
